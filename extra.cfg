// Personal config for Unkn-0-wngb — see README.md for what each of
// these does; everything below is a real override, not a placeholder.

// Required scroll binds (srconfigs won't detect scroll jumps without these)
bind mwheelup +scrollup
bind mwheeldown +scrolldown

// Use the srconfigs chat alias instead of the raw say bind
bind y chat

// Quick run-reset bind
bind r do_reset

// HUD: moved to not overlap the attempt counter in the top-left during
// CM practice. NOTE: don't override sar_hud_font_index - font 72 renders
// as broken icon-glyph tofu instead of text in this game's font table;
// srconfigs' default (68, set in srconfigs.cfg) is the known-good value.
sar_hud_x 8
sar_hud_y 8
sar_hud_spacing 6
sar_hud_bg 1
sar_hud_velocity 3
sar_hud_position 2
sar_hud_angles 1
sar_hud_demo 2

// Always show the CM attempt counter
svar_set cm_attempt_counter 1

// Keep dialogue toasts on in singleplayer, off in coop (I mostly solo IL/CM)
svar_set no_dialogue_toasts_sp 0
svar_set no_dialogue_toasts_coop 1

// Personal demo folder naming
svar_set demo_folder_name "demos/unkn"
